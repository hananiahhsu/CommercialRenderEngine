name: ci
on: [push, pull_request]
jobs:
  headless:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B out/build-headless -DCMAKE_BUILD_TYPE=Debug
      - name: Build
        run: cmake --build out/build-headless -j4
      - name: Test
        run: ctest --test-dir out/build-headless --output-on-failure
